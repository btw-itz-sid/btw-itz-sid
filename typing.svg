<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .code { font-family: 'Courier New', monospace; font-size: 14px; }
      .key { fill: #ff7b72; }
      .str { fill: #a5d6ff; }
      .val { fill: #79c0ff; }
      .punct { fill: #c9d1d9; }
      .comment { fill: #8b949e; }

      .line1 { animation: typing1 0.5s steps(1) 0.2s both; }
      .line2 { animation: typing1 0.5s steps(1) 0.7s both; }
      .line3 { animation: typing1 0.5s steps(1) 1.2s both; }
      .line4 { animation: typing1 0.5s steps(1) 1.7s both; }
      .line5 { animation: typing1 0.5s steps(1) 2.2s both; }
      .line6 { animation: typing1 0.5s steps(1) 2.7s both; }
      .line7 { animation: typing1 0.5s steps(1) 3.2s both; }

      .cursor { animation: blink 1s step-end infinite; fill: #58a6ff; }

      @keyframes typing1 {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }
    </style>
  </defs>

  <rect width="800" height="200" rx="10" class="bg"/>

  <circle cx="20" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="20" r="6" fill="#febc2e"/>
  <circle cx="60" cy="20" r="6" fill="#28c840"/>

  <g class="code">
    <text class="line1" x="20" y="55">
      <tspan class="val">siddharth</tspan>
      <tspan class="punct"> = {</tspan>
    </text>
    <text class="line2" x="20" y="75">
      <tspan class="str">    "role"</tspan>
      <tspan class="punct">     : </tspan>
      <tspan class="str">"3rd-year B.Tech CSE @ Galgotias University"</tspan>
      <tspan class="punct">,</tspan>
    </text>
    <text class="line3" x="20" y="95">
      <tspan class="str">    "focus"</tspan>
      <tspan class="punct">    : [</tspan>
      <tspan class="str">"AI/ML"</tspan>
      <tspan class="punct">, </tspan>
      <tspan class="str">"Cybersecurity"</tspan>
      <tspan class="punct">, </tspan>
      <tspan class="str">"Web Dev"</tspan>
      <tspan class="punct">, </tspan>
      <tspan class="str">"DSA"</tspan>
      <tspan class="punct">],</tspan>
    </text>
    <text class="line4" x="20" y="115">
      <tspan class="str">    "building"</tspan>
      <tspan class="punct"> : </tspan>
      <tspan class="str">"KhataGST — GST SaaS for Indian MSMEs"</tspan>
      <tspan class="punct">,</tspan>
    </text>
    <text class="line5" x="20" y="135">
      <tspan class="str">    "learning"</tspan>
      <tspan class="punct"> : [</tspan>
      <tspan class="str">"LLM Security"</tspan>
      <tspan class="punct">, </tspan>
      <tspan class="str">"Ethical Hacking"</tspan>
      <tspan class="punct">, </tspan>
      <tspan class="str">"Deep Learning"</tspan>
      <tspan class="punct">],</tspan>
    </text>
    <text class="line6" x="20" y="155">
      <tspan class="str">    "motto"</tspan>
      <tspan class="punct">    : </tspan>
      <tspan class="str">"Ship fast. Break things. Fix them better."</tspan>
      <tspan class="punct">,</tspan>
    </text>
    <text class="line7" x="20" y="175">
      <tspan class="punct">}</tspan>
    </text>
    <text class="cursor line7" x="32" y="175">▌</text>
  </g>
</svg>
```

